<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jarvis</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f4f6f8;
}

header {
    background: #111;
    color: white;
    padding: 15px;
    text-align: center;
}

.container {
    padding: 15px;
}

button {
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #111;
    color: white;
    font-size: 16px;
}

input {
    padding: 10px;
    width: 100%;
    margin-bottom: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

.card {
    background: white;
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 10px;
}
</style>
</head>

<body>

<header>Jarvis</header>

<div id="login" class="container">
    <button onclick="loginGoogle()">Entrar com Google</button>
</div>

<div id="app" class="container" style="display:none;">
    <h3>Nova despesa</h3>
    <input id="nome" placeholder="Nome">
    <input id="valor" placeholder="Valor">
    <button onclick="salvar()">Salvar</button>

    <h3>Despesas</h3>
    <div id="lista"></div>

    <br>
    <button onclick="logout()">Sair</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA10HIz1bpzh6NE1fLBZGlt36VQaYvrlKo",
  authDomain: "jarvis-controle-pessoal.firebaseapp.com",
  projectId: "jarvis-controle-pessoal",
  storageBucket: "jarvis-controle-pessoal.firebasestorage.app",
  messagingSenderId: "362750721688",
  appId: "1:362750721688:web:1fdad74d2a7aa9870c9aed"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const provider = new GoogleAuthProvider();

window.loginGoogle = async () => {
    await signInWithPopup(auth, provider);
};

window.logout = async () => {
    await signOut(auth);
};

onAuthStateChanged(auth, (user) => {
    if (user) {
        document.getElementById("login").style.display = "none";
        document.getElementById("app").style.display = "block";
        carregar();
    } else {
        document.getElementById("login").style.display = "block";
        document.getElementById("app").style.display = "none";
    }
});

window.salvar = async () => {
    const nome = document.getElementById("nome").value;
    const valor = document.getElementById("valor").value;

    if (!nome || !valor) return;

    await addDoc(collection(db, "despesas"), {
        nome,
        valor,
        created: new Date()
    });

    document.getElementById("nome").value = "";
    document.getElementById("valor").value = "";
};

function carregar() {
    const q = query(collection(db, "despesas"));

    onSnapshot(q, (snapshot) => {
        const lista = document.getElementById("lista");
        lista.innerHTML = "";

        snapshot.forEach(doc => {
            const d = doc.data();
            lista.innerHTML += `<div class="card">${d.nome} - R$ ${d.valor}</div>`;
        });
    });
}
</script>

</body>
</html>
