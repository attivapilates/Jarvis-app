<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jarvis</title>
  <style>
    :root{
      --bg:#f4f7fb;
      --card:#ffffff;
      --ink:#17212b;
      --muted:#627285;
      --line:#dfe7f0;
      --brand:#244a7c;
      --brand-2:#3a6ea5;
      --ok:#197a43;
      --warn:#b36a00;
      --bad:#b92e34;
      --soft:#eef4fb;
      --shadow:0 10px 30px rgba(23,33,43,.08);
      --radius:18px;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--ink)}
    .app{max-width:1200px;margin:0 auto;padding:16px 16px 92px}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
    .title-wrap h1{margin:0;font-size:28px}
    .title-wrap p{margin:4px 0 0;color:var(--muted)}
    .actions{display:flex;gap:8px;flex-wrap:wrap}
    button,select,input,textarea{font:inherit}
    .btn{border:none;background:var(--brand);color:white;padding:12px 14px;border-radius:14px;cursor:pointer;font-weight:700}
    .btn.secondary{background:white;color:var(--brand);border:1px solid var(--line)}
    .btn.ghost{background:var(--soft);color:var(--brand)}
    .btn.warn{background:var(--warn)}
    .btn.bad{background:var(--bad)}
    .btn.ok{background:var(--ok)}
    .tabs{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:16px}
    .tab{background:white;border:1px solid var(--line);padding:12px;border-radius:16px;text-align:center;cursor:pointer;font-weight:700;color:var(--muted)}
    .tab.active{background:var(--brand);color:white;border-color:var(--brand)}
    .view{display:none}
    .view.active{display:block}
    .grid{display:grid;gap:16px}
    .grid.kpi{grid-template-columns:repeat(4,1fr)}
    .grid.two{grid-template-columns:1.35fr .95fr}
    .grid.three{grid-template-columns:repeat(3,1fr)}
    .card{background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);border:1px solid #edf2f7}
    .card h3,.card h2{margin:0 0 12px}
    .muted{color:var(--muted)}
    .kpi .card{padding:18px}
    .kpi-value{font-size:28px;font-weight:800;margin-top:8px}
    .kpi-value.ok{color:var(--ok)}
    .kpi-value.bad{color:var(--bad)}
    .kpi-value.warn{color:var(--warn)}
    .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
    .toolbar input,.toolbar select,.field input,.field select,.field textarea{width:100%;padding:12px 12px;border:1px solid var(--line);border-radius:12px;background:white}
    .field{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
    .field label{font-size:14px;color:var(--muted);font-weight:700}
    .list{display:flex;flex-direction:column;gap:10px}
    .item{display:flex;justify-content:space-between;gap:12px;padding:12px;border:1px solid var(--line);border-radius:14px;background:#fbfdff;align-items:flex-start}
    .item-left{min-width:0}
    .item-title{font-weight:800;margin-bottom:4px}
    .item-sub{color:var(--muted);font-size:14px;line-height:1.4}
    .item-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .mini{padding:8px 10px;border-radius:10px;font-size:13px}
    .pill{display:inline-block;padding:6px 9px;border-radius:999px;font-size:12px;font-weight:700;background:var(--soft);color:var(--brand);margin-right:6px;margin-top:4px}
    .pill.ok{background:#e7f7ee;color:var(--ok)}
    .pill.bad{background:#fdeced;color:var(--bad)}
    .pill.warn{background:#fff3e0;color:var(--warn)}
    .section-title{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
    .empty{padding:18px;border:1px dashed var(--line);border-radius:14px;text-align:center;color:var(--muted);background:#fafcff}
    .month-nav{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .month-chip{padding:10px 12px;background:var(--soft);border-radius:12px;font-weight:700;color:var(--brand)}
    .split{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .inline{display:flex;gap:10px;flex-wrap:wrap}
    .shop-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
    .shop-tab{padding:10px 12px;border-radius:12px;border:1px solid var(--line);background:white;cursor:pointer;font-weight:700}
    .shop-tab.active{background:var(--brand);color:white;border-color:var(--brand)}
    .footer-nav{position:fixed;left:0;right:0;bottom:0;background:white;border-top:1px solid var(--line);display:none;grid-template-columns:repeat(6,1fr);z-index:5}
    .footer-nav button{padding:12px 4px;border:none;background:none;font-size:12px;color:var(--muted);font-weight:700}
    .footer-nav button.active{color:var(--brand)}
    .notice{background:#f1f7ff;border:1px solid #d6e6fb;color:var(--brand);padding:12px;border-radius:14px;margin-top:12px}
    .danger-note{background:#fff5f5;border:1px solid #ffd7d7;color:#8c2a2a;padding:12px;border-radius:14px;margin-top:12px}
    @media (max-width: 980px){
      .grid.kpi,.grid.two,.grid.three,.split{grid-template-columns:1fr 1fr}
      .tabs{grid-template-columns:repeat(3,1fr)}
    }
    @media (max-width: 720px){
      .grid.kpi,.grid.two,.grid.three,.split{grid-template-columns:1fr}
      .tabs{display:none}
      .footer-nav{display:grid}
      .app{padding-bottom:96px}
      .topbar{align-items:flex-start}
      .title-wrap h1{font-size:24px}
      .kpi-value{font-size:24px}
      .item{flex-direction:column}
      .item-actions{justify-content:flex-start}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="title-wrap">
        <h1>Jarvis</h1>
        <p>Controle financeiro, agenda, tarefas e compras em um só lugar.</p>
      </div>
      <div class="actions">
        <button class="btn" onclick="openQuickAction()">+ Ação rápida</button>
        <button class="btn secondary" onclick="exportData()">Exportar backup</button>
      </div>
    </div>

    <div class="tabs" id="desktopTabs"></div>

    <section class="view active" id="view-inicio"></section>
    <section class="view" id="view-financeiro"></section>
    <section class="view" id="view-agenda"></section>
    <section class="view" id="view-tarefas"></section>
    <section class="view" id="view-compras"></section>
    <section class="view" id="view-config"></section>
  </div>

  <div class="footer-nav" id="mobileTabs"></div>

  <dialog id="formDialog" style="border:none;border-radius:20px;max-width:720px;width:calc(100% - 24px);padding:0;box-shadow:0 20px 60px rgba(0,0,0,.2)"></dialog>
  <input type="file" id="importFile" accept="application/json" style="display:none" />

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js';
    import { getFirestore, doc, onSnapshot, setDoc } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyA10HIz1bpzh6NE1fLBZGlt36VQaYvrlKo",
      authDomain: "jarvis-controle-pessoal.firebaseapp.com",
      projectId: "jarvis-controle-pessoal",
      storageBucket: "jarvis-controle-pessoal.firebasestorage.app",
      messagingSenderId: "362750721688",
      appId: "1:362750721688:web:1fdad74d2a7aa9870c9aed"
    };

    const firebaseApp = initializeApp(firebaseConfig);
    const db = getFirestore(firebaseApp);
    const sharedStateRef = doc(db, 'jarvis', 'shared_state');
    let cloudReady = false;
    let cloudSyncTimer = null;
    let lastCloudHash = '';

    const STORAGE_KEY = 'jarvis_v2';
    const TABS = [
      { id:'inicio', label:'Início', icon:'🏠' },
      { id:'financeiro', label:'Financeiro', icon:'💰' },
      { id:'agenda', label:'Agenda', icon:'📅' },
      { id:'tarefas', label:'Tarefas', icon:'✅' },
      { id:'compras', label:'Compras', icon:'🛒' },
      { id:'config', label:'Config.', icon:'⚙️' },
    ];

    const monthNames = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
    const pad = n => String(n).padStart(2,'0');
    const today = new Date();

    const seedRecurring = [
      { name:'EMPRESTIMO BRB', category:'Empréstimos', type:'fixa', amount:1903.14, dueDay:5, paymentMethod:'Boleto', repeat:true },
      { name:'AGUA', category:'Casa', type:'fixa', amount:200.00, dueDay:13, paymentMethod:'Pix', repeat:true },
      { name:'ENERGIA', category:'Casa', type:'fixa', amount:50.00, dueDay:13, paymentMethod:'Pix', repeat:true },
      { name:'INTERNET CLARO', category:'Casa', type:'fixa', amount:405.00, dueDay:15, paymentMethod:'Cartão', repeat:true },
      { name:'INSS', category:'Impostos', type:'fixa', amount:166.98, dueDay:15, paymentMethod:'Pix', repeat:true },
      { name:'ALUGUEL CASA', category:'Moradia', type:'fixa', amount:2520.00, dueDay:20, paymentMethod:'Transferência', repeat:true },
      { name:'FINANCIAMENTO BYD', category:'Carro', type:'fixa', amount:3286.00, dueDay:26, paymentMethod:'Débito', repeat:true },
      { name:'FAXINA LUZIA', category:'Serviços', type:'fixa', amount:720.00, dueDay:27, paymentMethod:'Pix', repeat:true },
      { name:'BRADESCO SAUDE', category:'Saúde', type:'fixa', amount:2736.00, dueDay:29, paymentMethod:'Débito', repeat:true },
      { name:'BRADESCO SAUDE (CONTADOR)', category:'Saúde', type:'fixa', amount:150.00, dueDay:29, paymentMethod:'Pix', repeat:true },
      { name:'CARTÃO SICREDI', category:'Cartões', type:'variável', amount:480.00, dueDay:10, paymentMethod:'Cartão', repeat:true },
      { name:'CARTÃO ITAU', category:'Cartões', type:'variável', amount:265.00, dueDay:20, paymentMethod:'Cartão', repeat:true },
      { name:'CARTÃO MERCADO PAGO', category:'Cartões', type:'variável', amount:190.00, dueDay:20, paymentMethod:'Cartão', repeat:true },
      { name:'CARTÃO BRB', category:'Cartões', type:'variável', amount:1800.00, dueDay:25, paymentMethod:'Cartão', repeat:true },
      { name:'CARTÃO C6', category:'Cartões', type:'variável', amount:783.00, dueDay:25, paymentMethod:'Cartão', repeat:true },
      { name:'CARTÃO SANTANDER', category:'Cartões', type:'variável', amount:135.00, dueDay:25, paymentMethod:'Cartão', repeat:true },
    ];

    const defaultState = () => ({
      currentTab: 'inicio',
      selectedMonth: `${today.getFullYear()}-${pad(today.getMonth()+1)}`,
      shoppingView: 'mercado',
      settings: {
        systemName: 'Jarvis',
        user1: 'Cláudio',
        user2: 'Esposa',
        currency: 'BRL'
      },
      expenses: [],
      recurringTemplates: [...seedRecurring],
      appointments: [],
      tasks: [],
      shopping: [],
      income: []
    });

    let state = loadState();
    ensureRecurringForMonth(state.selectedMonth);
    renderAll();
    startCloudSync();

    function loadState(){
      try{
        const saved = localStorage.getItem(STORAGE_KEY);
        if(!saved) return defaultState();
        return { ...defaultState(), ...JSON.parse(saved) };
      }catch{
        return defaultState();
      }
    }
    function saveState(){
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }
    function getCloudPayload(){
      return {
        settings: state.settings,
        expenses: state.expenses,
        recurringTemplates: state.recurringTemplates,
        appointments: state.appointments,
        tasks: state.tasks,
        shopping: state.shopping,
        income: state.income
      };
    }
    function getCloudHash(payload = getCloudPayload()){
      return JSON.stringify(payload);
    }
    function applyCloudPayload(payload){
      state = {
        ...defaultState(),
        ...state,
        ...payload,
        currentTab: state.currentTab || 'inicio',
        selectedMonth: state.selectedMonth || `${today.getFullYear()}-${pad(today.getMonth()+1)}`,
        shoppingView: state.shoppingView || 'mercado'
      };
      ensureRecurringForMonth(state.selectedMonth);
      renderAll();
    }
    async function pushCloudState(){
      if(!cloudReady) return;
      const payload = getCloudPayload();
      const hash = getCloudHash(payload);
      if(hash === lastCloudHash) return;
      try{
        await setDoc(sharedStateRef, {
          state: payload,
          updatedAt: new Date().toISOString(),
          app: 'Jarvis'
        }, { merge: true });
        lastCloudHash = hash;
      }catch(error){
        console.error('Erro ao salvar no Firebase:', error);
      }
    }
    function scheduleCloudSync(){
      if(!cloudReady) return;
      const payload = getCloudPayload();
      const hash = getCloudHash(payload);
      if(hash === lastCloudHash) return;
      clearTimeout(cloudSyncTimer);
      cloudSyncTimer = setTimeout(() => { pushCloudState(); }, 700);
    }
    function startCloudSync(){
      try{
        onSnapshot(sharedStateRef, (snapshot) => {
          cloudReady = true;
          if(snapshot.exists() && snapshot.data()?.state){
            const incoming = snapshot.data().state;
            const incomingHash = getCloudHash(incoming);
            if(incomingHash !== lastCloudHash){
              lastCloudHash = incomingHash;
              applyCloudPayload(incoming);
            }
          } else {
            pushCloudState();
          }
        }, (error) => {
          console.error('Erro na sincronização com Firebase:', error);
          cloudReady = false;
        });
      }catch(error){
        console.error('Erro ao iniciar Firebase:', error);
        cloudReady = false;
      }
    }
    function uid(prefix='id'){ return `${prefix}_${Date.now()}_${Math.random().toString(36).slice(2,8)}`; }
    function formatMoney(v){
      return new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(Number(v||0));
    }
    function formatDate(dateStr){
      if(!dateStr) return '-';
      const d = new Date(dateStr+'T00:00:00');
      return d.toLocaleDateString('pt-BR');
    }
    function currentMonthLabel(){
      const [year,month] = state.selectedMonth.split('-');
      return `${monthNames[Number(month)-1]} / ${year}`;
    }
    function nextMonth(monthKey, delta){
      let [y,m] = monthKey.split('-').map(Number);
      m += delta;
      if(m<1){ m=12; y--; }
      if(m>12){ m=1; y++; }
      return `${y}-${pad(m)}`;
    }
    function getMonthExpenseList(monthKey){
      return state.expenses.filter(x=>x.month===monthKey).sort((a,b)=>a.dueDate.localeCompare(b.dueDate));
    }
    function getMonthIncomeList(monthKey){
      return state.income.filter(x=>x.month===monthKey).sort((a,b)=>a.date.localeCompare(b.date));
    }
    function ensureRecurringForMonth(monthKey){
      const [year, month] = monthKey.split('-');
      state.recurringTemplates.forEach(t => {
        const exists = state.expenses.some(e => e.month===monthKey && e.templateId===t.templateId);
        if(!exists){
          if(!t.templateId) t.templateId = uid('tpl');
          state.expenses.push({
            id: uid('exp'),
            templateId: t.templateId,
            month: monthKey,
            name: t.name,
            category: t.category,
            type: t.type,
            amount: Number(t.amount),
            actualAmount: Number(t.amount),
            dueDate: `${year}-${month}-${pad(t.dueDay)}`,
            paymentMethod: t.paymentMethod || '',
            notes: '',
            paid: false,
            repeat: true,
            createdAt: new Date().toISOString()
          });
        }
      });
      saveState();
    }
    function monthSummary(monthKey){
      const list = getMonthExpenseList(monthKey);
      const incomes = getMonthIncomeList(monthKey);
      const total = list.reduce((s,x)=>s+Number(x.actualAmount||x.amount||0),0);
      const paid = list.filter(x=>x.paid).reduce((s,x)=>s+Number(x.actualAmount||x.amount||0),0);
      const pending = total - paid;
      const cards = list.filter(x=>x.category==='Cartões' || x.name.toLowerCase().includes('cartão')).reduce((s,x)=>s+Number(x.actualAmount||x.amount||0),0);
      const totalIncome = incomes.reduce((s,x)=>s+Number(x.amount||0),0);
      return { total, paid, pending, cards, totalIncome, balance: totalIncome-total, countPending:list.filter(x=>!x.paid).length };
    }
    function upcomingExpenses(limit=5){
      const now = new Date();
      const all = [...state.expenses]
        .filter(e=>!e.paid)
        .sort((a,b)=>a.dueDate.localeCompare(b.dueDate));
      return all.filter(e => new Date(e.dueDate+'T00:00:00') >= new Date(now.getFullYear(), now.getMonth(), now.getDate())).slice(0, limit);
    }
    function upcomingAppointments(limit=5){
      const todayDate = new Date();
      return [...state.appointments]
        .sort((a,b)=>`${a.date}${a.time||''}`.localeCompare(`${b.date}${b.time||''}`))
        .filter(a => new Date(`${a.date}T${a.time || '00:00'}:00`) >= todayDate)
        .slice(0,limit);
    }
    function pendingTasks(limit=5){
      return state.tasks.filter(t=>t.status!=='concluída').sort((a,b)=>(a.deadline||'9999').localeCompare(b.deadline||'9999')).slice(0,limit);
    }
    function pendingShopping(limit=6){
      return state.shopping.filter(i=>!i.done).slice(0,limit);
    }

    function renderAll(){
      renderTabs();
      renderInicio();
      renderFinanceiro();
      renderAgenda();
      renderTarefas();
      renderCompras();
      renderConfig();
      switchTab(state.currentTab, false);
      saveState();
      scheduleCloudSync();
    }

    function renderTabs(){
      const html = TABS.map(t => `<button class="tab ${state.currentTab===t.id?'active':''}" onclick="switchTab('${t.id}')">${t.icon} ${t.label}</button>`).join('');
      document.getElementById('desktopTabs').innerHTML = html;
      document.getElementById('mobileTabs').innerHTML = TABS.map(t => `<button class="${state.currentTab===t.id?'active':''}" onclick="switchTab('${t.id}')">${t.icon}<br>${t.label}</button>`).join('');
    }

    function switchTab(tabId, rerender=true){
      state.currentTab = tabId;
      document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
      document.getElementById(`view-${tabId}`).classList.add('active');
      if(rerender) renderAll(); else renderTabs();
      saveState();
    }

    function renderInicio(){
      const m = monthSummary(state.selectedMonth);
      document.getElementById('view-inicio').innerHTML = `
        <div class="grid kpi">
          <div class="card"><div class="muted">Saldo do mês</div><div class="kpi-value ${m.balance>=0?'ok':'bad'}">${formatMoney(m.balance)}</div></div>
          <div class="card"><div class="muted">Total pago</div><div class="kpi-value ok">${formatMoney(m.paid)}</div></div>
          <div class="card"><div class="muted">Total pendente</div><div class="kpi-value warn">${formatMoney(m.pending)}</div></div>
          <div class="card"><div class="muted">Contas pendentes</div><div class="kpi-value">${m.countPending}</div></div>
        </div>

        <div class="grid two" style="margin-top:16px">
          <div class="card">
            <div class="section-title">
              <h3>Resumo rápido de ${currentMonthLabel()}</h3>
              <div class="month-nav">
                <button class="btn secondary mini" onclick="changeMonth(-1)">◀</button>
                <div class="month-chip">${currentMonthLabel()}</div>
                <button class="btn secondary mini" onclick="changeMonth(1)">▶</button>
              </div>
            </div>
            <div class="list">
              <div class="item"><div class="item-left"><div class="item-title">Entradas do mês</div><div class="item-sub">Tudo que entrou no período</div></div><div class="item-title">${formatMoney(m.totalIncome)}</div></div>
              <div class="item"><div class="item-left"><div class="item-title">Saídas do mês</div><div class="item-sub">Total das despesas lançadas</div></div><div class="item-title">${formatMoney(m.total)}</div></div>
              <div class="item"><div class="item-left"><div class="item-title">Total em cartões</div><div class="item-sub">Tudo que está na categoria cartões</div></div><div class="item-title">${formatMoney(m.cards)}</div></div>
            </div>
            <div class="notice">Esta versão salva tudo no próprio aparelho usando o navegador. Depois podemos evoluir para compartilhamento entre você e sua esposa na nuvem.</div>
          </div>

          <div class="card">
            <div class="section-title"><h3>Ações rápidas</h3></div>
            <div class="grid three">
              <button class="btn" onclick="openExpenseForm()">+ Nova despesa</button>
              <button class="btn" onclick="openIncomeForm()">+ Nova entrada</button>
              <button class="btn" onclick="openAppointmentForm()">+ Compromisso</button>
              <button class="btn" onclick="openTaskForm()">+ Tarefa</button>
              <button class="btn" onclick="openShoppingForm()">+ Item compra</button>
              <button class="btn secondary" onclick="switchTab('financeiro')">Ver financeiro</button>
            </div>
          </div>
        </div>

        <div class="grid three" style="margin-top:16px">
          <div class="card">
            <div class="section-title"><h3>Próximas contas</h3></div>
            ${renderSimpleList(upcomingExpenses(), e => `
              <div class="item-title">${e.name}</div>
              <div class="item-sub">Vence em ${formatDate(e.dueDate)} • ${formatMoney(e.actualAmount || e.amount)}</div>
            `, 'Nenhuma conta pendente no momento.')}
          </div>
          <div class="card">
            <div class="section-title"><h3>Próximos compromissos</h3></div>
            ${renderSimpleList(upcomingAppointments(), a => `
              <div class="item-title">${a.title}</div>
              <div class="item-sub">${formatDate(a.date)} ${a.time ? '• '+a.time : ''}${a.location ? ' • '+a.location : ''}</div>
            `, 'Nenhum compromisso cadastrado.')}
          </div>
          <div class="card">
            <div class="section-title"><h3>Pendências rápidas</h3></div>
            ${renderSimpleList([...pendingTasks(3), ...pendingShopping(3)], x => {
              if(x.category){
                return `<div class="item-title">Compra: ${x.name}</div><div class="item-sub">${x.category} ${x.quantity ? '• qtd: '+x.quantity : ''}</div>`
              }
              return `<div class="item-title">Tarefa: ${x.title}</div><div class="item-sub">${x.deadline ? 'Prazo: '+formatDate(x.deadline) : 'Sem prazo definido'}</div>`
            }, 'Nenhuma pendência por aqui.')}
          </div>
        </div>
      `;
    }

    function renderFinanceiro(){
      const summary = monthSummary(state.selectedMonth);
      const expenses = getMonthExpenseList(state.selectedMonth);
      const income = getMonthIncomeList(state.selectedMonth);
      document.getElementById('view-financeiro').innerHTML = `
        <div class="grid kpi">
          <div class="card"><div class="muted">Entradas</div><div class="kpi-value ok">${formatMoney(summary.totalIncome)}</div></div>

    function saveExpense(event, id=''){
      event.preventDefault();
      const fd = new FormData(event.target);
      const expense = {
        id: id || uid('exp'),
        month: (fd.get('dueDate') || `${state.selectedMonth}-01`).slice(0,7),
        name: fd.get('name'),
        category: fd.get('category'),
        type: fd.get('type'),
        amount: Number(fd.get('amount') || 0),
        actualAmount: Number(fd.get('amount') || 0),
        dueDate: fd.get('dueDate'),
        paymentMethod: fd.get('paymentMethod'),
        notes: fd.get('notes'),
        paid: fd.get('paid') === 'on',
        repeat: fd.get('repeat') === 'on',
        createdAt: new Date().toISOString(),
      };
      if(id){
        const idx = state.expenses.findIndex(x=>x.id===id);
        const old = state.expenses[idx] || {};
        state.expenses[idx] = { ...old, ...expense };
      }else{
        state.expenses.push(expense);
      }
      if(expense.repeat){
        upsertRecurringTemplate(expense);
      }
      state.selectedMonth = expense.month;
      closeDialog();
      renderAll();
    }

    function upsertRecurringTemplate(expense){
      let existing = state.recurringTemplates.find(t => t.name===expense.name && t.category===expense.category);
      const dueDay = Number((expense.dueDate || '').slice(-2)) || 1;
      if(existing){
        existing.type = expense.type;
        existing.amount = Number(expense.actualAmount || expense.amount || 0);
        existing.dueDay = dueDay;
        existing.paymentMethod = expense.paymentMethod;
      }else{
        state.recurringTemplates.push({
          templateId: uid('tpl'),
          name: expense.name,
          category: expense.category,
          type: expense.type,
          amount: Number(expense.actualAmount || expense.amount || 0),
          dueDay,
          paymentMethod: expense.paymentMethod,
          repeat: true
        });
      }
    }

    function exportData(){
      const blob = new Blob([JSON.stringify(state,null,2)], {type:'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `jarvis-backup-${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }
    document.getElementById('importFile').addEventListener('change', function(){
      const file = this.files[0]; if(!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        try{
          const data = JSON.parse(e.target.result);
          state = { ...defaultState(), ...data };
          ensureRecurringForMonth(state.selectedMonth);
          renderAll();
          alert('Backup importado com sucesso.');
        }catch{
          alert('Não consegui importar esse arquivo.');
        }
      };
      reader.readAsText(file);
      this.value='';
    });
    function resetSystem(){
      if(!confirm('Tem certeza que deseja apagar tudo?')) return;
      localStorage.removeItem(STORAGE_KEY);
      state = defaultState();
      ensureRecurringForMonth(state.selectedMonth);
      renderAll();
    }
    function loadDemoData(){
      const month = state.selectedMonth;
      state.income.push({id:uid('inc'), month, description:'Entrada principal', category:'Receita', amount:23000, date:`${month}-05`, notes:''});
      state.appointments.push({id:uid('apt'), title:'Consulta', date:`${month}-12`, time:'09:00', location:'Clínica', notes:'Levar documentos'});
      state.tasks.push({id:uid('tsk'), title:'Conferir contas do mês', deadline:`${month}-10`, priority:'alta', status:'pendente', description:'Olhar tudo antes do vencimento.'});
      state.shopping.push({id:uid('shop'), name:'Arroz', quantity:'2 pacotes', category:'mercado', priority:'alta', notes:'Tipo 1', done:false});
      state.shopping.push({id:uid('shop'), name:'Sabonete', quantity:'4 unidades', category:'farmácia', priority:'média', notes:'', done:false});
      renderAll();
    }

    function openDialog(content){
      const d = document.getElementById('formDialog');
      d.innerHTML = content;
      d.showModal();
    }
    function closeDialog(){ document.getElementById('formDialog').close(); }

    function escapeHtml(str=''){ return String(str).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s])); }
    function escapeAttr(str=''){ return escapeHtml(str); }

    window.switchTab = switchTab;
    window.changeMonth = changeMonth;
    window.togglePaid = togglePaid;
    window.deleteExpense = deleteExpense;
    window.openExpenseForm = openExpenseForm;
    window.saveExpense = saveExpense;
    window.openIncomeForm = openIncomeForm;
    window.saveIncome = saveIncome;
    window.deleteIncome = deleteIncome;
    window.openAppointmentForm = openAppointmentForm;
    window.saveAppointment = saveAppointment;
    window.deleteAppointment = deleteAppointment;
    window.openTaskForm = openTaskForm;
    window.saveTask = saveTask;
    window.completeTask = completeTask;
    window.reopenTask = reopenTask;
    window.deleteTask = deleteTask;
    window.setShoppingView = setShoppingView;
    window.openShoppingForm = openShoppingForm;
    window.saveShopping = saveShopping;
    window.toggleShopping = toggleShopping;
    window.deleteShopping = deleteShopping;
    window.openQuickAction = openQuickAction;
    window.closeDialog = closeDialog;
    window.updateSetting = updateSetting;
    window.exportData = exportData;
    window.resetSystem = resetSystem;
    window.loadDemoData = loadDemoData;
  </script>
